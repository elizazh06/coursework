dataset:
  module: music_avqa
  name: MusicAVQADataset
  batch_size: 8
  eval_batch_size: 8
  num_workers: 2
  pin_memory: false
  params:
    root_dir: data/music_avqa
    split: train
    max_len: 16
    prepare_data: false
    strict_media: false
    max_samples: null
    use_official_features: true
    features:
      audio_dir: data/music_avqa/feats/vggish
      visual_dir: data/music_avqa/feats/res18_14x14
