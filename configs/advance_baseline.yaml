trainer:
  seed: 42
  device: auto          # в Colab автоматически выберет cuda, если доступна
  n_epochs: 20
  save_dir: checkpoints
  save_period: 1
  monitor: "max val_accuracy"
  early_stop: 10
  max_grad_norm: 1.0
  skip_oom: true
  # какие тензоры переносим на устройство
  device_tensors: ["video", "audio", "question", "label"]
  resume_from: null
  from_pretrained: null
  epoch_len: null       # epoch-based обучение
  log_step: 50

writer:
  _target_: writer.simple_writer.SimpleWriter
  run_name: advance_baseline
  log_checkpoints: false
  loss_names: ["loss"]

dataset:
  module: advance
  name: ADVANCEDataset
  batch_size: 16
  eval_batch_size: 64
  num_workers: 2
  pin_memory: false
  params:
    vision_root: /content/drive/MyDrive/zenodo_dataset/ADVANCE_vision
    audio_root: /content/drive/MyDrive/zenodo_dataset/ADVANCE_sound
    sample_rate: 16000
    n_mels: 128
    max_audio_seconds: 5.0
    image_size: 224
    val_ratio: 0.1
    test_ratio: 0.1
    split_seed: 42

model:
  _target_: models.advance_baseline.ADVANCEBaselineModel
  # num_classes = 13 для ADVANCE (фиксировано в конструкторе по умолчанию)
  hidden_dim: 256
  dropout: 0.2
  use_pretrained_backbone: true

loss_function:
  _target_: losses.cross_entropy.CrossEntropyLossWrapper

metrics:
  train:
    - _target_: metrics.simple_metrics.AccuracyMetric
      name: accuracy
  inference:
    - _target_: metrics.simple_metrics.AccuracyMetric
      name: accuracy

optimizer:
  _target_: torch.optim.AdamW
  lr: 3.0e-4
  weight_decay: 1.0e-4

lr_scheduler:
  _target_: torch.optim.lr_scheduler.StepLR
  step_size: 10
  gamma: 0.5

