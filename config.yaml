dataset:
  module: music_avqa
  name: MusicAVQADataset
  train_split: train
  val_split: val
  test_split: test
  batch_size: 32
  eval_batch_size: 64
  num_workers: 2
  params:
    root_dir: ./data/music_avqa
    max_len: 10
    max_samples:
    vocab_size: 1000
    prepare_data: true
    strict_media: true
    use_official_features: false
    features:
      audio_dir: ./data/music_avqa/feats/vggish
      visual_dir: ./data/music_avqa/feats/res18_14x14
    frame_stride: 6
    download:
      annotations:
        train: ""
        val: ""
        test: ""
      media:
        video_base_url: "https://huggingface.co/datasets/UnFaZeD07/Music-AVQA/resolve/main/videos"

model:
  module: music_avqa_author_baseline
  name: AVQAAuthorBaselineModel
  params:
    vocab_size: 1000
    hidden_dim: 512
    dropout: 0.1
    num_heads: 4

training:
  lr: 1e-4
  epochs: 15
  device: cuda
  weight_decay: 1e-5
  lr_step_size: 8
  lr_gamma: 0.1
  grad_clip_norm: 1.0